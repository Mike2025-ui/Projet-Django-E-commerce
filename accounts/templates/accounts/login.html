<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Connexion | Shop-in-Line</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 60%, #d946ef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 1.2rem;
            box-shadow: 0 8px 32px rgba(124,58,237,0.12), 0 1.5px 8px rgba(168,85,247,0.10);
            width: 100%;
            max-width: 380px;
            margin: 1rem;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #7c3aed;
            font-weight: bold;
            letter-spacing: 1px;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #7c3aed;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.7rem 1rem;
            margin-bottom: 1.2rem;
            border-radius: 0.6rem;
            border: 2px solid #e5e7eb;
            background: #f9f9fe;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #a855f7;
            outline: none;
            background: #fff;
        }
        .error-message {
            color: #d946ef;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 500;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(90deg, #a855f7 0%, #7c3aed 100%);
            border: none;
            border-radius: 0.6rem;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(168,85,247,0.10);
            transition: background 0.2s, box-shadow 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg, #7c3aed 0%, #a855f7 100%);
            box-shadow: 0 4px 16px rgba(168,85,247,0.18);
        }
        .register-link {
            text-align: center;
            margin-top: 1.2rem;
        }
        .register-link a {
            text-decoration: none;
            color: #a855f7;
            font-weight: 600;
            transition: color 0.2s;
        }
        .register-link a:hover {
            color: #7c3aed;
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .login-container {
                padding: 1.2rem 0.5rem;
                border-radius: 0.7rem;
                max-width: 98vw;
            }
            h2 { font-size: 1.3rem; }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Connexion</h2>

        {% if messages %}
        {% for message in messages %}
        <div class="error-message">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="username">Nom d'utilisateur :</label>
            <input type="text" name="username" id="username" required>

            <label for="password">Mot de passe :</label>
            <input type="password" name="password" id="password" required>

            <button type="submit">Se connecter</button>
        </form>

        <div class="register-link">
            <p>Pas encore inscrit ? <a href="{% url 'register' %}">Créer un compte</a></p>
        </div>
    </div>
</body>

</html>
