{% extends 'shop/base.html' %}
{% block content %}
<h3>Mes produits</h3>
<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
    {% for p in produits %}
    <div class="col">
        <div class="card">
            <img src="{{ p.get_image }}" class="card-img-top" style="height: 150px; object-fit: cover;">
            <div class="card-body">
                <h5>{{ p.nom }}</h5>
                <p>{{ p.prix }} FCFA</p>
                <a href="{% url 'modifier_produit' p.pk %}" class="btn btn-sm btn-warning">Modifier</a>
                <a href="{% url 'supprimer_produit' p.pk %}" class="btn btn-sm btn-danger">Supprimer</a>
            </div>
        </div>
    </div>
    {% empty %}<p>Aucun produit.</p>{% endfor %}
</div>
{% endblock %}
